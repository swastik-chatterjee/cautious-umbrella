workflows:
  android-build:
    name: NativeScript Android Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 18
      java: 17
    scripts:
      - name: Install NativeScript CLI and Node modules
        script: |
          npm install -g nativescript
          npm install
      - name: Build Android Debug Package
        script: |
          ns build android --no-hmr
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk
